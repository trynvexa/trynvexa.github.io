    <!-- Contact -->
    <section id="contact" class="pt-5 pb-0">
      <div class="container" data-aos="zoom-out" data-aos-offset="200" data-aos-delay="100" data-aos-duration="1000">
        <div class="row text-center mb-5">
          <div class="col">

          </div>

        <div class="row justify-content-center">
          <div class="col-md-6">
            <div class="alert alert-success alert-dismissible fade show d-none my-alert" role="alert">

              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>

            <form name="yuha-contact-from">
              <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>

                <textarea class="form-control" id="pesan" rows="3" name="pesan"></textarea>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      const galleryImage = document.querySelectorAll(".gallery-img");

      galleryImage.forEach((img, i) => {
        img.dataset.aos = "fade-down";
        img.dataset.aosDelay = i * 100;
        img.dataset.aosDuration = 1000;
      });

      AOS.init();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/TextPlugin.min.js"></script>
    <script>
      gsap.registerPlugin(TextPlugin);

      // Lead Text
      gsap.to(".lead", {
        duration: 1.5,
        delay: 1,
        text: "Pelajar | Web Programming",
      });

      // About Me Text
      gsap.to(".fs-5", {
        duration: 4,
        delay: 1.5,
        text: "Saya adalah mahasiswa Teknik Rekayasa Perangkat Lunak (RPL) yang berfokus pada pengembangan Front-End. Saya berfokus pada penciptaan pengalaman digital yang menarik dan selalu berupaya memberikan solusi terbaik dalam setiap proyek yang saya kerjakan.",
      });

      // Card Text Animation (satu per satu)
      const cardTexts = document.querySelectorAll(".card-text");

      gsap.to(cardTexts[0], {
        duration: 8,
        delay: 1,
        text: "Saya terus mengembangkan kemampuan coding Front-End dengan menulis kode yang rapi, efisien, dan terstruktur, serta mempelajari teknologi terbaru untuk membangun website yang responsif dan interaktif.",
      });

      gsap.to(cardTexts[1], {
        duration: 8,
        delay: 1,
        text: "✨ Keep going, even when it feels hard. Every small step you take brings you closer to your dreams 🌟",
      });

      gsap.to(cardTexts[2], {
        duration: 8,
        delay: 1,
        text: "💻 プログラミングはただコードを書くことではなく、アイデアを生み出し、夢を現実に変えることです。🚀",
      });

      // Image Animation
      gsap.from(".jumbotron img", {
        duration: 1,
        y: -100,
        opacity: 0,
      });

      // Title Animation
      gsap.from(".display-4", {
        duration: 1,
        x: -50,
        opacity: 0,
        delay: 0.2,
      });
    </script>

    <script>
      const scriptURL = "https://script.google.com/macros/s/AKfycbzaPQLQ2jiJg3eoS9ZZEPW_KIq02aL9NzIw_GVn1UGz5eRb9-yFddtEOx5VwuG13TI0DQ/exec";

      const form = document.forms["yuha-contact-from"];
      const btnKirim = document.querySelector(".btn-kirim");
      const btnLoading = document.querySelector(".btn-loading");
      const myAlert = document.querySelector(".my-alert");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        // tampilkan loading
        btnLoading.classList.remove("d-none");
        btnKirim.classList.add("d-none");

        fetch(scriptURL, {
          method: "POST",
          mode: "no-cors",
          body: new FormData(form),
        })
          .then(() => {
            // sembunyikan loading
            btnLoading.classList.add("d-none");
            btnKirim.classList.remove("d-none");

            // tampilkan alert
            myAlert.classList.remove("d-none");

            // reset form
            form.reset();
          })
          .catch((error) => {
            console.error("Error!", error.message);

            btnLoading.classList.add("d-none");
            btnKirim.classList.remove("d-none");
          });
      });
    </script>
